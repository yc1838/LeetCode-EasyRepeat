<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="popup_page_title">LeetCode EasyRepeat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=JetBrains+Mono:wght@100;400;700&family=Courier+Prime:wght@400;700&family=Inter:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <div class="extension-container">
        <!-- STATUS BAR -->
        <header class="status-bar">
            <div id="brand-title" data-i18n="popup_brand">LeetCode EasyRepeat OS</div>
            <div class="status-controls">
                <button id="lang-toggle" class="lang-toggle" type="button" title="Switch to 中文">E</button>
                <div class="status-ready"><span id="status-ready-label" data-i18n="popup_sys_ready">[SYS_READY]</span> <span id="clock">00:00:00</span></div>
            </div>
        </header>

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="nav-icon active" id="tab-dashboard" title="Dashboard" data-i18n-title="popup_nav_dashboard_title">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
            </div>
            <div class="nav-icon" id="tab-all" title="All Vectors" data-i18n-title="popup_nav_all_vectors_title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 12 12 17 22 12"></polyline>
                    <polyline points="2 17 12 22 22 17"></polyline>
                </svg>
            </div>
            <!-- Theme Toggle -->
            <div class="nav-icon" id="btn-theme" title="Switch Theme" data-i18n-title="popup_nav_switch_theme_title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="5" />
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
            </div>
            <!-- Options / Setup -->
            <div class="nav-icon nav-icon-setup" id="btn-setup" title="Open Setup" data-i18n-title="popup_nav_open_setup_title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.33 1V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-.33-1 1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 0-1-.33H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1-.33 1.65 1.65 0 0 0 .6-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 0 .33-1V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 .33 1 1.65 1.65 0 0 0 1 .6 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.16.33.25.69.26 1.06a1.65 1.65 0 0 0 1 .6H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1 .33 1.65 1.65 0 0 0-.51 1.01z">
                    </path>
                </svg>
            </div>
        </aside>
        <!-- VIEWPORT -->
        <main class="viewport">

            <!-- COGNITIVE MAP (Global Stats) -->
            <section class="heatmap-container">
                <div class="heatmap-header heatmap-header-welcome">
                    <span id="welcome-message" data-i18n="popup_welcome">WELCOME! READY FOR SOME LEETCODE?</span>
                    <span id="streak-display" aria-live="polite">
                        <span class="streak-label" data-i18n="popup_streak_days">STREAK DAYS:</span>
                        <span id="streak-value" class="streak-value">--</span>
                    </span>
                </div>
                <div class="heatmap-grid" id="global-heatmap">
                    <!-- JS Generated Cells -->
                </div>
            </section>

            <!-- ACTIVE VECTORS (Queue) -->
            <section>
                <div class="heatmap-header" style="margin-bottom: 15px;">
                    <span id="queue-title">PROBLEMS DUE TODAY</span>
                </div>

                <!-- FILTER BAR -->
                <div class="filter-bar" id="filter-bar">
                    <select id="filter-difficulty" class="filter-select" title="Filter by difficulty">
                        <option value="all" data-i18n="filter_all_difficulty">Difficulty</option>
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                    <select id="filter-topic" class="filter-select" title="Filter by topic">
                        <option value="all" data-i18n="filter_all_topics">All Topics</option>
                    </select>
                    <select id="filter-time" class="filter-select" title="Filter by time range">
                        <option value="all" data-i18n="filter_all_time">All Time</option>
                        <option value="7" data-i18n="filter_last_7d">Last 7 Days</option>
                        <option value="30" data-i18n="filter_last_30d">Last 30 Days</option>
                        <option value="90" data-i18n="filter_last_90d">Last 90 Days</option>
                    </select>
                </div>

                <div class="vector-list" id="vector-list">
                    <!-- Cards will be injected here via popup.js -->
                </div>
            </section>

        </main>
    </div>

    <div id="global-tooltip" class="srs-tooltip"></div>
    <script type="module" src="popup.entry.js"></script>
</body>

</html>
